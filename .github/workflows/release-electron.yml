name: Release Electron

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-electron:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (arm64)
            os: macos-latest
            dist-cmd: dist:mac
            artifact-name: electron-mac-arm64
            artifact-path: |
              packages/electron/dist/*.dmg
              packages/electron/dist/*.zip
          - name: macOS (x64)
            os: macos-13
            dist-cmd: dist:mac
            artifact-name: electron-mac-x64
            artifact-path: |
              packages/electron/dist/*.dmg
              packages/electron/dist/*.zip
          - name: Linux (x64)
            os: ubuntu-latest
            dist-cmd: dist:linux
            artifact-name: electron-linux-x64
            artifact-path: packages/electron/dist/*.AppImage
          - name: Windows (x64)
            os: windows-latest
            dist-cmd: dist:win
            artifact-name: electron-win-x64
            artifact-path: packages/electron/dist/*.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build electron app
        run: bun run build:electron

      - name: Set macOS signing env
        if: runner.os == 'macOS'
        run: |
          echo "CSC_LINK=${{ secrets.CSC_LINK }}" >> $GITHUB_ENV
          echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}" >> $GITHUB_ENV
          echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> $GITHUB_ENV
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> $GITHUB_ENV
          echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" >> $GITHUB_ENV

      - name: Package electron app
        working-directory: packages/electron
        run: bun run ${{ matrix.dist-cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  release:
    name: Attach to Release
    needs: build-electron
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
