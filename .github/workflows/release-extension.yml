name: Release Extension

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Release Chrome Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint

      - name: Run tests
        run: bun run test:ci

      - name: Build extension
        run: bun run build

      - name: Create extension zip
        run: cd dist && zip -r ../extension.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'alpha') }}
          generate_release_notes: true
          files: |
            extension.zip
          body: |
            ## Design Review v${{ steps.version.outputs.version }}

            ### Chrome Extension

            1. Download `extension.zip` from the assets below
            2. Extract the zip file to a folder
            3. Open Chrome → `chrome://extensions/` → Enable "Developer mode"
            4. Click "Load unpacked" and select the extracted folder

            ### Desktop App

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` (arm64) |
            | macOS (Intel) | `.dmg` (x64) |
            | Linux | `.AppImage` |
            | Windows | `.exe` installer |

            **macOS:** Open the DMG and drag to Applications.
            **Linux:** `chmod +x *.AppImage && ./*.AppImage`
            **Windows:** Run the installer and follow the prompts.

            ### Changes

            See the full changelog below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension.zip

      # Optional: Publish to Chrome Web Store
      # Uncomment when ready to publish publicly
      # You'll need to set up CHROME_EXTENSION_ID and CHROME_CLIENT_SECRET secrets
      # See: https://github.com/marketplace/actions/chrome-extension-upload-action
      # - name: Publish to Chrome Web Store
      #   if: ${{ !contains(steps.version.outputs.version, 'rc') && !contains(steps.version.outputs.version, 'beta') && !contains(steps.version.outputs.version, 'alpha') }}
      #   uses: mnao305/chrome-extension-upload@v5.0.0
      #   with:
      #     file-path: extension.zip
      #     extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
      #     client-id: ${{ secrets.CHROME_CLIENT_ID }}
      #     client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
      #     refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
