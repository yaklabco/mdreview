<svg width="768" height="768" viewBox="0 0 768 768" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a88440"/>
      <stop offset="100%" stop-color="#6a5734"/>
    </linearGradient>
    <radialGradient id="faceGlow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#fdfdfd" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="768" height="768" fill="url(#bgGrad)" />
  <!-- Circle badge -->
  <circle cx="384" cy="300" r="230" fill="#c6dfea" stroke="#151515" stroke-width="18" />
  <!-- Subtle inner glow -->
  <circle cx="384" cy="300" r="210" fill="url(#faceGlow)" />
  <!-- Document body -->
  <rect x="255" y="155" width="220" height="260" rx="24" ry="24"
        fill="#3c3f44" stroke="#151515" stroke-width="14" />
  <!-- Folded corner -->
  <path d="M445 155 L505 215 L505 247 C505 262 493 274 478 274 L445 274 Z"
        fill="#3c3f44" stroke="#151515" stroke-width="14" stroke-linejoin="round" />
  <!-- MD letters -->
  <text x="290" y="245"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="700"
        font-size="72"
        fill="#f5f7fa">
    MD
  </text>
  <!-- Down arrow with "legs" under MD -->
  <path d="M345 260 L345 310" stroke="#f5f7fa" stroke-width="10" stroke-linecap="round" />
  <path d="M330 295 L345 310 L360 295"
        fill="none" stroke="#f5f7fa" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  <line x1="320" y1="312" x2="334" y2="312" stroke="#f5f7fa" stroke-width="10" stroke-linecap="round" />
  <line x1="356" y1="312" x2="370" y2="312" stroke="#f5f7fa" stroke-width="10" stroke-linecap="round" />
  <!-- Cute face: eyes + smile -->
  <!-- Eyes -->
  <circle cx="314" cy="290" r="10" fill="#151515" />
  <circle cx="386" cy="290" r="10" fill="#151515" />
  <!-- Smile -->
  <path d="M326 315 Q350 335 374 315"
        fill="none" stroke="#151515" stroke-width="8" stroke-linecap="round" />
  <!-- Cheeks -->
  <circle cx="296" cy="307" r="14" fill="#ffb4b4" />
  <circle cx="404" cy="307" r="14" fill="#ffb4b4" />
  <!-- Chrome badge (overlapping bottom-right of sheet) -->
  <g transform="translate(430,295)">
    <!-- outer ring -->
    <circle cx="0" cy="0" r="65" fill="#151515" />
    <circle cx="0" cy="0" r="57" fill="#f5f7fa" />
    <!-- chrome tri-color wheel -->
    <g transform="scale(0.75)">
      <path d="M0 -70 A70 70 0 0 1 60 10 L20 10 A30 30 0 0 0 0 -30 Z" fill="#ea4335" />
      <path d="M60 10 A70 70 0 0 1 -60 10 L-20 10 A30 30 0 0 0 20 10 Z" fill="#fbbc05" />
      <path d="M-60 10 A70 70 0 0 1 0 -70 L0 -30 A30 30 0 0 0 -20 10 Z" fill="#34a853" />
      <circle cx="0" cy="0" r="28" fill="#4285f4" stroke="#f5f7fa" stroke-width="6" />
    </g>
  </g>
  <!-- MDview text label -->
  <text x="384" y="610"
        text-anchor="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="700"
        font-size="72"
        fill="#151515">
    MDview
  </text>
  <!-- Subtitle (optional: "Markdown Extension for Chrome") -->
  <!--
  <text x="384" y="660"
        text-anchor="middle"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="500"
        font-size="26"
        letter-spacing="2"
        fill="#151515">
    MARKDOWN EXTENSION FOR CHROME
  </text>
  -->
</svg